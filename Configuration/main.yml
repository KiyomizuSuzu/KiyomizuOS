title: Main
actions:
  # ==============================================================================
  # DOWNLOADING SOFTWARES
  # ==============================================================================
  - !status: {status: "Installing Powershell 7 (Required)"}
  - !download: 
    destination: PowerShell-7.6.2-win-x64.msi
    url: https://github.com/PowerShell/PowerShell/releases/download/v7.6.2/PowerShell-7.6.2-win-x64.msi
  - !run:
    exeDir: true
    exe: C:\Windows\System32\msiexec.exe
    args: /package PowerShell-7.6.2-win-x64.msi /quiet DISABLE_TELEMETRY=1

  - !status: {status: "Installing 7-Zip ZS (Required)"}
  - !download:
    destination: 7z25.01-zstd-x64.exe
    url: https://github.com/mcmilk/7-Zip-zstd/releases/download/v25.01-v1.5.7-R4/7z25.01-zstd-x64.exe
  - !run:
    exeDir: true
    exe: 7z25.01-zstd-x64.exe
    args: /S

  - !status: {status: "Installing Microsoft Visual C++ Redistributable"}
  - !download:
    destination: vc_redist.x64.exe
    url: https://aka.ms/vc14/vc_redist.x64.exe
  - !run:
    exeDir: true
    exe: vc_redist.x64.exe
    args: /install /quiet /norestart
  - !download:
    destination: vc_redist.x86.exe
    url: https://aka.ms/vc14/vc_redist.x86.exe
  - !run:
    exeDir: true
    exe: vc_redist.x86.exe
    args: /install /quiet /norestart

  - !status: {status: "Installing Librewolf", option: librewolf}
  - !download:
    destination: librewolf-151.0.2-1-windows-x86_64-setup.exe
    url: https://dl.librewolf.net/librewolf/151.0.2-1/librewolf-151.0.2-1-windows-x86_64-setup.exe
    option: librewolf
  - !run:
    exeDir: true
    exe: librewolf-151.0.2-1-windows-x86_64-setup.exe
    args: /S
    option: librewolf
  
  - !status: {status: "Installing Helium", option: helium}
  - !download:
    destination: helium_0.12.5.1_x64-installer.exe
    url: https://github.com/imputnet/helium-windows/releases/download/0.12.5.1/helium_0.12.5.1_x64-installer.exe
    option: helium
  - !run:
    exeDir: true
    exe: C:\Program Files\7-Zip-Zstandard\7z.exe
    args: x helium_0.12.5.1_x64-installer.exe -o"helium_0.12.5.1_x64-installer" -aoa
    option: helium
  - !run:
    exeDir: true
    exe: C:\Program Files\PowerShell\7\pwsh.exe
    args: -NoProfile -ExecutionPolicy Bypass -NonInteractive -Command "Start-Process '.\helium_0.12.5.1_x64-installer\$TEMP\helium_install\setup.exe' -ArgumentList '--install-archive=.\helium_0.12.5.1_x64-installer\$TEMP\helium_install\helium.7z --silent --install --system-level --do-not-launch-chrome' -Wait" 2>$null
    option: helium

  # ==============================================================================
  # MAIN DEBLOAT
  # ==============================================================================
  - !status: {status: "Executing debloat scripts (This will take a while)"}
  - !run:
    exeDir: true
    exe: C:\Program Files\PowerShell\7\pwsh.exe
    args: -NoProfile -ExecutionPolicy Bypass -NonInteractive -File .\BloatRemoval.ps1
  - !run:
    exeDir: true
    exe: C:\Program Files\PowerShell\7\pwsh.exe
    args: -NoProfile -ExecutionPolicy Bypass -NonInteractive -File .\EdgeRemoval.ps1
  - !run:
    exeDir: true
    exe: C:\Program Files\PowerShell\7\pwsh.exe
    args: -NoProfile -ExecutionPolicy Bypass -NonInteractive -File .\OneDriveRemoval.ps1

  - !status: {status: "Configuring Winhance power plan"}
  - !run:
    exeDir: true
    exe: C:\Program Files\PowerShell\7\pwsh.exe
    args: -NoProfile -ExecutionPolicy Bypass -NonInteractive -File .\PowerPlan.ps1

  - !status: {status: "Running registry modications"}
  - !run:
    exeDir: true
    exe: C:\Program Files\PowerShell\7\pwsh.exe
    args: -NoProfile -ExecutionPolicy Bypass -NonInteractive -File .\Registry.ps1

  - !status: {status: "Disabling nonessential scheduled tasks"}
  - !run:
    exeDir: true
    exe: C:\Program Files\PowerShell\7\pwsh.exe
    args: -NoProfile -ExecutionPolicy Bypass -NonInteractive -File .\ScheduledTask.ps1

  - !status: {status: "Disabling not needed services"}
  - !run:
    exeDir: true
    exe: C:\Program Files\PowerShell\7\pwsh.exe
    args: -NoProfile -ExecutionPolicy Bypass -NonInteractive -File .\Service.ps1

  # ==============================================================================
  # ADDITIONAL OPTIMIZATIONS
  # ==============================================================================
  - !status: {status: "Switching to Pro For Workstations Edition" }
  - !run:
    exeDir: true
    exe: C:\Program Files\PowerShell\7\pwsh.exe
    args: -NoProfile -ExecutionPolicy Bypass -NonInteractive -File .\ProForWorkstations.ps1

  - !status: {status: "Disabling legacy NTFS behaviors" }
  - !run: 
    exe: C:\Windows\System32\fsutil.exe
    args: behavior set disableLastAccess 1
  - !run: 
    exe: C:\Windows\System32\fsutil.exe
    args: behavior set disable8dot3 1

  - !status: {status: "Enabling WIFI random hardware addresses"}
  - !run:
    exe: C:\Windows\System32\netsh.exe
    args: wlan set randomization enabled=yes interface="Wi-Fi"

  - !status: {status: "Turning off bluetooth by default"}
  - !download:
    destination: Bluetooth.exe
    url: https://github.com/KiyomizuSuzu/Bluetooth/releases/download/1.0.0/Bluetooth.exe
  - !run:
    exeDir: true
    exe: Bluetooth.exe
    args: /off

  - !status: {status: "Setting file/folder handler in Windows 11 context menu"}
  - !download:
    destination: Handle.zip
    url: https://download.sysinternals.com/files/Handle.zip
  - !download:
    destination: FileOrFolderInUse.exe
    url: https://github.com/KiyomizuSuzu/FileOrFolderInUse/releases/download/1.0.0/FileOrFolderInUse.exe
  - !run:
    exeDir: true
    exe: C:\Program Files\7-Zip-Zstandard\7z.exe
    args: x Handle.zip -aoa
  - !run:
    exe: C:\Program Files\PowerShell\7\pwsh.exe
    args: -NoProfile -ExecutionPolicy Bypass -NonInteractive -Command "New-Item -ItemType Directory -Path 'C:\ProgramData\AME\FileOrFolderInUse' -Force | Out-Null"
  - !run:
    exeDir: true
    exe: C:\Program Files\PowerShell\7\pwsh.exe
    args: -NoProfile -ExecutionPolicy Bypass -NonInteractive -Command "Copy-Item '.\FileOrFolderInUse.exe' 'C:\ProgramData\AME\FileOrFolderInUse\' -Force; Copy-Item '.\handle.exe' 'C:\ProgramData\AME\FileOrFolderInUse\' -Force; Copy-Item '.\handle64.exe' 'C:\ProgramData\AME\FileOrFolderInUse\' -Force; Copy-Item '.\handle64a.exe' 'C:\ProgramData\AME\FileOrFolderInUse\' -Force; Copy-Item '.\Eula.txt' 'C:\ProgramData\AME\FileOrFolderInUse\' -Force"
  - !registryValue:
      path: HKEY_CLASSES_ROOT\*\shell\FileOrFolderInUse
      value: ""
      type: REG_SZ
      data: Show file handles
  - !registryValue:
      path: HKEY_CLASSES_ROOT\*\shell\FileOrFolderInUse\command
      value: ""
      type: REG_SZ
      data: '"C:\ProgramData\AME\FileOrFolderInUse\FileOrFolderInUse.exe" "%1"'
  - !registryValue:
      path: HKEY_CLASSES_ROOT\Directory\shell\FileOrFolderInUse
      value: ""
      type: REG_SZ
      data: Show folder handles
  - !registryValue:
      path: HKEY_CLASSES_ROOT\Directory\shell\FileOrFolderInUse\command
      value: ""
      type: REG_SZ
      data: '"C:\ProgramData\AME\FileOrFolderInUse\FileOrFolderInUse.exe" "%1"'

  # ==============================================================================
  # FINALIZING
  # ==============================================================================
  - !status: {status: "Setting default browser properly", oobe: only}
  - !run:
    exe: C:\Program Files\PowerShell\7\pwsh.exe
    args: -NoProfile -ExecutionPolicy Bypass -NonInteractive -Command "New-Item -ItemType Directory -Path 'C:\Users\Default\AppData\Roaming\Microsoft\Internet Explorer\Quick Launch\User Pinned\TaskBar' -Force | Out-Null"
    oobe: only
  - !run:
    exeDir: true
    exe: C:\Program Files\PowerShell\7\pwsh.exe
    args: -NoProfile -ExecutionPolicy Bypass -NonInteractive -Command "Copy-Item '.\File Explorer.lnk' 'C:\Users\Default\AppData\Roaming\Microsoft\Internet Explorer\Quick Launch\User Pinned\TaskBar\' -Force"
    oobe: only
  - !run:
    exeDir: true
    exe: C:\Program Files\PowerShell\7\pwsh.exe
    args: -NoProfile -ExecutionPolicy Bypass -NonInteractive -Command "Copy-Item '.\Librewolf.lnk' 'C:\Users\Default\AppData\Roaming\Microsoft\Internet Explorer\Quick Launch\User Pinned\TaskBar\' -Force"
    option: librewolf
    oobe: only
  - !run:
    exeDir: true
    exe: C:\Program Files\PowerShell\7\pwsh.exe
    args: -NoProfile -ExecutionPolicy Bypass -NonInteractive -Command "Copy-Item '.\Helium.lnk' 'C:\Users\Default\AppData\Roaming\Microsoft\Internet Explorer\Quick Launch\User Pinned\TaskBar\' -Force"
    option: helium
    oobe: only
  - !run:
    exeDir: true
    exe: C:\Program Files\PowerShell\7\pwsh.exe
    args: -NoProfile -ExecutionPolicy Bypass -NonInteractive -Command "Copy-Item '.\LayoutModification.xml' 'C:\Users\Default\AppData\Local\Microsoft\Windows\Shell\' -Force"
    oobe: only
  - !run:
    exeDir: true
    exe: C:\Windows\System32\dism.exe
    args: /online /Import-DefaultAppAssociations:defaultLibrewolf-assoc.xml
    option: librewolf
    oobe: only
  - !run:
    exeDir: true
    exe: C:\Windows\System32\dism.exe
    args: /online /Import-DefaultAppAssociations:defaultHelium-assoc.xml
    option: helium
    oobe: only

  - !status: {status: "Setting up ActiveSetup for new users", oobe: only}
  - !run:
    exeDir: true
    exe: C:\Program Files\PowerShell\7\pwsh.exe
    args: -NoProfile -ExecutionPolicy Bypass -NonInteractive -Command "New-Item -ItemType Directory -Path 'C:\ProgramData\AME\ActiveSetup' -Force | Out-Null"
    oobe: only
  - !run:
    exeDir: true
    exe: C:\Program Files\PowerShell\7\pwsh.exe
    args: -NoProfile -ExecutionPolicy Bypass -NonInteractive -Command "Copy-Item '.\Module.psm1' 'C:\ProgramData\AME\ActiveSetup\' -Force"
    oobe: only
  - !run:
    exeDir: true
    exe: C:\Program Files\PowerShell\7\pwsh.exe
    args: -NoProfile -ExecutionPolicy Bypass -NonInteractive -File .\ActiveSetup.ps1
    oobe: only

  - !status: {status: "Switching to light theme", option: light, iso: true}
  - !registryValue:
      path: HKEY_LOCAL_MACHINE\SOFTWARE\AME 
      value: UseLightTheme 
      type: REG_DWORD
      data: 1 
      option: light
      iso: true

  - !status: {status: "Disabling some protected permission", iso: true}
  - !registryValue:
      path: HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\userAccountInformation
      value: Value 
      type: REG_SZ
      data: Deny
      iso: only
  - !registryValue:
      path: HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\appDiagnostics
      value: Value 
      type: REG_SZ
      data: Deny
      iso: only
  - !registryValue:
      path: HKEY_USERS\AME_UserHive_Default\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\userAccountInformation
      value: Value 
      type: REG_SZ
      data: Deny
      oobe: only
  - !registryValue:
      path: HKEY_USERS\AME_UserHive_Default\SOFTWARE\Microsoft\Windows\CurrentVersion\CapabilityAccessManager\ConsentStore\appDiagnostics
      value: Value 
      type: REG_SZ
      data: Deny
      oobe: only

  - !status: {status: "Disabling Bitlocker completely", iso: only}
  - !registryValue:
      path: HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\BitLocker 
      value: PreventDeviceEncryption
      type: REG_DWORD
      data: 1
      iso: only

  - !status: {status: "Live system detected", oobe: false}
  - !run:
    exeDir: true
    exe: C:\Program Files\PowerShell\7\pwsh.exe
    args: -NoProfile -ExecutionPolicy Bypass -NonInteractive -File .\LiveSystem.ps1
    oobe: false

  - !status: {status: "Checking if In-place Upgrade is initiated", oobe: only}
  - !run:
    exeDir: true
    exe: C:\Program Files\PowerShell\7\pwsh.exe
    args: -NoProfile -ExecutionPolicy Bypass -NonInteractive -File .\InplaceUpgrade.ps1
    oobe: only
