<?xml version="1.0" encoding="utf-8"?>
<Playbook>
    <Name>KiyomizuOS</Name>
    <Username>Kiyomizu Suzu</Username>
    <ShortDescription>Based on Winhance with playbook in mind</ShortDescription>
    <Title>KiyomizuOS playbook</Title>
    <Description>Do not use this on an existing Windows, please use ISO injection only.</Description>
    <Details>This does not support checking for updates.</Details>
    <Version>2.0</Version>
    <UniqueId>adbb1730-7b6e-460e-a33f-fa95adffe082</UniqueId>
    <Overhaul>true</Overhaul>
    <SupportedBuilds>
        <string>26200</string>
    </SupportedBuilds>
    <Requirements>
        <Requirement>Internet</Requirement>
    </Requirements>
    <SupportsISO>true</SupportsISO>
    <ISO>
        <DisableHardwareRequirements>true</DisableHardwareRequirements>
    </ISO>
    <OOBE>
        <BulletPoints>
            <BulletPoint Icon="Lock" Title="Actually stable"
            Description="I'm always here to help troubleshoot if something goes wrong, but so far, so good."/>
            <BulletPoint Icon="Privacy" Title="Permission Revoked"
            Description="Most nonessential access has been denied, leaving only what's genuinely needed."/>
            <BulletPoint Icon="Rocket" Title="Responsive, not faster"
            Description="Customized the Winhance power plan while reducing redundant background activity."/>
        </BulletPoints>
    </OOBE>
    <FeaturePages>
        <RadioImagePage DefaultOption="librewolf" Description="Please set a default browser as this playbook will remove Edge entirely!!">
            <TopLine Text="If you choose none, you will be left with no browser."/>
            <Options>
                <RadioImageOption None="true"/>
                <RadioImageOption>
                    <Text>Librewolf</Text>
                    <Name>librewolf</Name>
                    <FileName>librewolf</FileName>
                    <GradientTopColor>#057DB6</GradientTopColor>
                    <GradientBottomColor>#86D8FF</GradientBottomColor>
                </RadioImageOption>
                <RadioImageOption>
                    <Text>Helium</Text>
                    <Name>helium</Name>
                    <FileName>helium</FileName>
                    <GradientTopColor>#4b6cb7</GradientTopColor>
                    <GradientBottomColor>#182848</GradientBottomColor>
                </RadioImageOption>
            </Options>
            <BottomLine Text="For comparison, please click me to learn more." Link="https://docs.amelabs.net/general/browsers.html"/>
        </RadioImagePage>
        <RadioImagePage DefaultOption="dark" Description="Choose Light mode for improved visibility or Dark mode to reduce eye strain.">
            <TopLine Text="There's no wrong answers here."/>
            <Options>
                <RadioImageOption>
                    <Text>Dark mode</Text>
                    <Name>dark</Name>
                    <FileName>dark</FileName>
                    <GradientTopColor>#070a12</GradientTopColor>
                    <GradientBottomColor>#1a2233</GradientBottomColor>
                </RadioImageOption>
                <RadioImageOption>
                    <Text>Light mode</Text>
                    <Name>light</Name>
                    <FileName>light</FileName>
                    <GradientTopColor>#f3f6fb</GradientTopColor>
                    <GradientBottomColor>#dbe7f3</GradientBottomColor>
                </RadioImageOption>
            </Options>
        </RadioImagePage>
    </FeaturePages>
</Playbook>