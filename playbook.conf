<?xml version="1.0" encoding="utf-8"?>
<Playbook>
    <Name>KiyomizuOS</Name>
    <Username>Shimizu Suzu</Username>
    <ShortDescription>Thank you Winhance~</ShortDescription>
    <Title>KiyomizuOS playbook</Title>
    <Description>Hello! Welcome to KiyomizuOS. Please read the GitHub page first if you have not already.</Description>
    <Details>New releases will be published on GitHub so no worries.</Details>
    <Version>3.0.0 Stable</Version>
    <Git>https://github.com/KiyomizuSuzu/KiyomizuOS</Git>
    <UniqueId>adbb1730-7b6e-460e-a33f-fa95adffe082</UniqueId>
    <SupportedBuilds>
        <string>26200</string> #30/9/2025
    </SupportedBuilds>
    <Requirements>
        <Requirement>Internet</Requirement>
    </Requirements>
    <SupportsISO>true</SupportsISO>
    <ISO>
        <DisableHardwareRequirements>true</DisableHardwareRequirements>
    </ISO>
    <OOBE>
        <BulletPoints>
            <BulletPoint Icon="Lock" Title="Stable probably"
                Description="I will check what's wrong if there is an issue with anything really!"/>
            <BulletPoint Icon="Privacy" Title="Stay private please"
                Description="Your footprints should be smaller by now, but I won't stop you :]"/>
            <BulletPoint Icon="Rocket" Title="We're like lemon and lemon"
                Description="It just means we're a perfect match, like a romantic couple..."/>
        </BulletPoints>
    </OOBE>
    <FeaturePages>
        <RadioImagePage DefaultOption="librewolf" Description="Microsoft Edge will be removed, no but! You can always get it back later.">
            <Options>
                <RadioImageOption None="true"/>
                <RadioImageOption>
                    <Text>Librewolf</Text>
                    <Name>librewolf</Name>
                    <FileName>librewolf</FileName>
                    <GradientTopColor>#057DB6</GradientTopColor>
                    <GradientBottomColor>#86D8FF</GradientBottomColor>
                </RadioImageOption>
                <RadioImageOption>
                    <Text>Helium</Text>
                    <Name>helium</Name>
                    <FileName>helium</FileName>
                    <GradientTopColor>#4b6cb7</GradientTopColor>
                    <GradientBottomColor>#182848</GradientBottomColor>
                </RadioImageOption>
            </Options>
            <BottomLine Text="LibreWolf is Firefox - Helium is Chrome"/>
        </RadioImagePage>
        <RadioImagePage DefaultOption="dark" Description="Set your Windows theme to Light/Dark mode">
            <Options>
                <RadioImageOption>
                    <Text>Dark mode</Text>
                    <Name>dark</Name>
                    <FileName>dark</FileName>
                    <GradientTopColor>#070a12</GradientTopColor>
                    <GradientBottomColor>#1a2233</GradientBottomColor>
                </RadioImageOption>
                <RadioImageOption>
                    <Text>Light mode</Text>
                    <Name>light</Name>
                    <FileName>light</FileName>
                    <GradientTopColor>#f3f6fb</GradientTopColor>
                    <GradientBottomColor>#dbe7f3</GradientBottomColor>
                </RadioImageOption>
            </Options>
            <BottomLine Text="I like Dark mode (≧▽≦)"/>
        </RadioImagePage>
    </FeaturePages>
</Playbook>